<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hologram Face — Live Chat</title>
<style>
html,body{margin:0;height:100%;background:#050b12;overflow:hidden}
canvas{display:block;width:100vw;height:100vh}

.chat{
  position:fixed;left:0;right:0;bottom:0;
  padding:14px 16px 18px;
  display:flex;justify-content:center;
  background:linear-gradient(transparent, rgba(0,0,0,0.82));
  z-index:10;
}
.chat form{
  width:min(760px,94vw);
  display:grid;
  grid-template-columns:1fr 54px;
  gap:10px;
}
.chat input{
  width:100%;
  background:rgba(0,0,0,0.58);
  border:1px solid rgba(160,220,255,0.26);
  color:#e9f7ff;
  padding:14px 16px;border-radius:16px;outline:none;
  backdrop-filter: blur(16px);
  box-shadow:0 18px 50px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08), 0 0 0 1px rgba(120,220,255,0.06);
}
.chat input::placeholder{color:rgba(225,245,255,0.45)}
.chat button{
  border:1px solid rgba(160,220,255,0.28);
  border-radius:16px;
  background:linear-gradient(180deg, rgba(90,220,255,0.22), rgba(55,150,255,0.12));
  color:#dff8ff;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 12px 30px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
}
.chat button:disabled{opacity:.5;cursor:default}

.feed{
  position:fixed;left:50%;transform:translateX(-50%);
  bottom:90px;width:min(760px,94vw);max-height:42vh;overflow:auto;
  display:flex;flex-direction:column;gap:8px;
  padding:0 2px 8px;
  z-index:9;
  scrollbar-width:none;
}
.feed::-webkit-scrollbar{display:none}
.bubble{
  max-width:84%;padding:10px 12px;border-radius:14px;
  font-size:14px;line-height:1.4;white-space:pre-wrap;
  backdrop-filter: blur(8px);
  box-shadow:0 10px 24px rgba(0,0,0,0.22);
}
.user{align-self:flex-end;background:rgba(120,220,255,0.14);border:1px solid rgba(120,220,255,0.25);color:#e8fbff}
.bot{align-self:flex-start;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);color:#ecf8ff}
.typing::after{content:'▋';animation:blink .9s steps(1) infinite;margin-left:2px;color:#9fe7ff}
@keyframes blink{50%{opacity:0}}

.status{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  padding:8px 12px;border-radius:999px;
  font:12px/1 Arial,sans-serif;color:rgba(225,245,255,.86);
  background:rgba(0,0,0,.32);border:1px solid rgba(160,220,255,.15);
  backdrop-filter:blur(10px);z-index:11;letter-spacing:.08em;text-transform:uppercase;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="status" id="status">Idle</div>
<div class="feed" id="feed"></div>
<div class="chat">
  <form id="chatForm">
    <input id="input" autocomplete="off" placeholder="Message" />
    <button id="send" type="submit">↑</button>
  </form>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status');
const input=document.getElementById('input');
const feed=document.getElementById('feed');
const form=document.getElementById('chatForm');
const sendBtn=document.getElementById('send');

const state={
  mode:'idle',
  mood:'calm',
  speakAmp:0,
  thinkingAmp:0,
  lastUserAt:0,
  streamText:'',
  messages:[
    {role:'system',content:'You are a retro-futuristic hologram guide. Be concise, intelligent, warm, and visually evocative. Sound confident and calm. Avoid emojis.'}
  ]
};

function setMode(mode){ state.mode=mode; statusEl.textContent=mode; }
function resize(){
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(innerWidth*dpr);
  canvas.height=Math.floor(innerHeight*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();addEventListener('resize',resize);

const cols=82, rows=124;
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function smooth(a,b,x){let t=clamp((x-a)/(b-a),0,1);return t*t*(3-2*t)}
function gauss(x,y,cx,cy,sx,sy,a){let dx=(x-cx)/sx, dy=(y-cy)/sy;return Math.exp(-(dx*dx+dy*dy)*2)*a}
function noise(x,y,t){return Math.sin(x*3+t*0.6)*Math.cos(y*2.2-t*0.5)*0.5}

function inferMood(text=''){
  const s=text.toLowerCase();
  if(/love|great|amazing|awesome|beautiful|yes|cool/.test(s)) return 'bright';
  if(/help|how|what|why|can you|could you/.test(s)) return 'focused';
  return 'calm';
}

function face(nx,ny,t){
  let r=nx*nx+ny*ny; let mask=1-smooth(0.72,1.05,r);
  let skull=gauss(nx,ny,0,-0.05,0.7,0.9,1.05);
  let cheeks=gauss(nx,ny,-0.3,0.05,0.25,0.3,0.28)+gauss(nx,ny,0.3,0.05,0.25,0.3,0.28);
  let nose=gauss(nx,ny,0,-0.05,0.1,0.4,0.52);
  let brow=gauss(nx,ny,0,-0.3,0.5,0.12,0.2);
  let eyes=gauss(nx,ny,-0.22,-0.12,0.18,0.08,1.22)+gauss(nx,ny,0.22,-0.12,0.18,0.08,1.22);
  let mouthBase=gauss(nx,ny,0,0.35,0.25,0.12,-0.14);
  let mouthTalk=gauss(nx,ny,0,0.35,0.2,0.09,-0.22*state.speakAmp);
  let smile=(state.mood==='bright'?gauss(nx,ny,-0.2,0.33,0.1,0.06,0.06)+gauss(nx,ny,0.2,0.33,0.1,0.06,0.06):0);
  let focus=(state.mood==='focused'?gauss(nx,ny,0,-0.28,0.42,0.08,0.06):0);
  let thinkWaves=noise(nx*1.9,ny*1.6,t*1.2)*0.08*state.thinkingAmp;
  let micro=noise(nx*1.6,ny*1.6,t*0.7)*0.07;
  return (skull+cheeks+nose+brow+eyes+mouthBase+mouthTalk+smile+focus+thinkWaves+micro)*mask;
}

function draw(t){
 const w=canvas.clientWidth,h=canvas.clientHeight;
 ctx.clearRect(0,0,w,h);
 let bg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h));
 bg.addColorStop(0,'#0a2032');bg.addColorStop(1,'#02060a');
 ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

 const size=Math.min(w,h)*1.2;
 const startX=(w-size)/2, startY=(h-size)/2;
 const cw=size/cols, ch=size/rows;
 const camX=Math.sin(t*0.4)*20 + Math.sin(t*0.13)*10;
 const camY=Math.cos(t*0.35)*14;
 const tearing=(state.mode==='speaking'||state.mode==='thinking') && Math.random()<0.025 ? (Math.random()*56-28) : 0;

 for(let j=0;j<rows;j++){
  const rowGlitch=((state.mode==='speaking' || state.mode==='thinking') && Math.random()<0.01) ? (Math.random()*18-9) : 0;
  for(let i=0;i<cols;i++){
    let nx=(i/(cols-1))*2-1, ny=(j/(rows-1))*2-1;
    let d=face(nx,ny,t);
    let px=startX+i*cw+camX, py=startY+j*ch+camY;
    let z=d*92 + Math.sin(t*2.6 + j*0.06)*state.speakAmp*10;
    let perspective=1+z*0.0024;
    let width=cw*1.34*perspective, height=Math.max(1,ch*0.16*perspective);
    let cx=px+cw/2+tearing+rowGlitch, cy=py+ch/2-z;
    let glow=clamp(0.34+d*1.6,0.2,2.1);

    ctx.shadowColor='rgba(120,240,255,0.98)';
    ctx.shadowBlur=24+d*44 + state.speakAmp*8;
    let col=`rgba(${90+glow*120},${220+glow*40},255,${0.78+glow*0.28})`;
    ctx.fillStyle=col;
    ctx.fillRect(cx-width/2,cy-height/2,width,height);

    if(d>0.92){
      ctx.fillStyle='rgba(255,255,255,0.94)';
      ctx.fillRect(cx-width/3,cy-height/3,width/1.5,height/1.5);
    }
    ctx.shadowBlur=0;
  }
 }

 ctx.fillStyle='rgba(120,240,255,0.06)';
 for(let y=0;y<h;y+=3){ctx.fillRect(0,y,w,1)}

 if(state.mode!=='idle' && Math.random()<0.14){
   let x=Math.random()*w;
   ctx.fillStyle='rgba(255,255,255,0.05)';
   ctx.fillRect(x,0,3+Math.random()*3,h);
 }
 if(state.mode==='thinking' && Math.random()<0.2){
   const gy=Math.random()*h;
   ctx.fillStyle='rgba(140,240,255,0.08)';
   ctx.fillRect(0,gy,w,2);
 }

 let halo=ctx.createRadialGradient(w/2,h/2,50,w/2,h/2,Math.min(w,h)/2);
 halo.addColorStop(0,'rgba(120,240,255,0.38)');halo.addColorStop(1,'rgba(0,0,0,0)');
 ctx.fillStyle=halo;ctx.fillRect(0,0,w,h);
}

let lastTime=performance.now();
function animateState(dt){
  const speakTarget=state.mode==='speaking' ? 1 : 0;
  const thinkTarget=state.mode==='thinking' ? 1 : 0;
  state.speakAmp += (speakTarget - state.speakAmp) * Math.min(1, dt*0.008);
  state.thinkingAmp += (thinkTarget - state.thinkingAmp) * Math.min(1, dt*0.008);
}

function loop(now){
  const dt=now-lastTime; lastTime=now;
  animateState(dt);
  draw((now)/1000);
  requestAnimationFrame(loop)
}
loop(performance.now());

function addBubble(text,cls,typing=false){
 const el=document.createElement('div');
 el.className=`bubble ${cls}${typing?' typing':''}`;
 el.textContent=text;
 feed.appendChild(el);
 feed.scrollTop=feed.scrollHeight;
 return el;
}

function updateBubble(el,text){
  el.textContent=text;
  feed.scrollTop=feed.scrollHeight;
}

function setTypingBubble(el, on){
  el.classList.toggle('typing', on);
}

function getApiKey(){
  return window.OPENAI_API_KEY || localStorage.getItem('OPENAI_API_KEY') || '';
}

async function streamOpenAI(messages,onToken){
  const apiKey=getApiKey();
  if(!apiKey) throw new Error('No API key found. Add window.OPENAI_API_KEY or localStorage.OPENAI_API_KEY.');

  const response = await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':`Bearer ${apiKey}`
    },
    body:JSON.stringify({
      model:'gpt-4.1-mini',
      stream:true,
      temperature:0.8,
      messages
    })
  });

  if(!response.ok || !response.body){
    const txt = await response.text().catch(()=> 'Request failed');
    throw new Error(txt || 'Request failed');
  }

  const reader=response.body.getReader();
  const decoder=new TextDecoder();
  let buffer='';

  while(true){
    const {value,done}=await reader.read();
    if(done) break;
    buffer += decoder.decode(value,{stream:true});
    const parts=buffer.split('\n\n');
    buffer=parts.pop()||'';
    for(const part of parts){
      const lines=part.split('\n').filter(Boolean);
      for(const line of lines){
        if(!line.startsWith('data:')) continue;
        const data=line.slice(5).trim();
        if(data==='[DONE]') return;
        try{
          const json=JSON.parse(data);
          const token=json.choices?.[0]?.delta?.content || '';
          if(token) onToken(token);
        }catch{}
      }
    }
  }
}

async function mockStream(prompt,onToken){
  const bank=[
    'I am online. The signal is stable. ',
    'You can ask me anything and I will answer in a calm, clear voice. ',
    'This interface is now reacting to the conversation in real time. '
  ];
  let text=bank[Math.floor(Math.random()*bank.length)];
  if(/who are you/i.test(prompt)) text='I am a projected conversational interface, rendered as light, drift, and signal.';
  if(/hello|hi/i.test(prompt)) text='Hello. I am here.';
  if(/test/i.test(prompt)) text='Testing complete. Input, streaming, and response states are active.';
  for(const ch of text){
    await new Promise(r=>setTimeout(r, 16 + Math.random()*24));
    onToken(ch);
  }
}

async function respond(prompt){
  state.mood=inferMood(prompt);
  state.lastUserAt=performance.now();
  setMode('thinking');
  sendBtn.disabled=true;

  const bubble=addBubble('', 'bot', true);
  let full='';

  const streamer = getApiKey() ? streamOpenAI : mockStream;

  try{
    const messages=[...state.messages,{role:'user',content:prompt}];
    await streamer(messages,(token)=>{
      if(state.mode!=='speaking') setMode('speaking');
      full += token;
      updateBubble(bubble, full);
    });
    setTypingBubble(bubble,false);
    state.messages.push({role:'user',content:prompt},{role:'assistant',content:full || '...'});
  }catch(err){
    setTypingBubble(bubble,false);
    full = `Connection issue: ${err.message}`;
    updateBubble(bubble, full);
  }finally{
    setMode('idle');
    sendBtn.disabled=false;
    input.focus();
  }
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const text=input.value.trim();
  if(!text || sendBtn.disabled) return;
  input.value='';
  addBubble(text,'user');
  await respond(text);
});

window.setHologramApiKey = function(key){
  localStorage.setItem('OPENAI_API_KEY', key);
  return 'saved';
};
</script>
</body>
</html>
